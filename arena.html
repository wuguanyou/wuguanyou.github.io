<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿魔法師 - 競技場大廳</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            /* 設定競技場大廳背景圖 */
            background-image: url('bg_arena.png');
            background-size: cover; background-position: center;
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Noto Serif TC', serif; color: #ffffff;
            animation: fadeIn 0.5s ease forwards;
            transition: opacity 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 頂部資訊列 --- */
        header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; }
        
        .player-profile { display: flex; align-items: center; gap: 15px; cursor: pointer; transition: transform 0.2s; }
        .player-profile:hover { transform: scale(1.05); }
        
        /* 支援動態更換的頭像樣式 */
        .avatar { 
            width: 60px; height: 60px; border-radius: 50%; 
            border: 2px solid #ffd700; background: rgba(10, 20, 40, 0.8); 
            object-fit: cover; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .player-info { display: flex; flex-direction: column; }
        .player-level { font-size: 14px; color: #ffd700; font-weight: bold; }
        .player-name { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        .top-right-menu { display: flex; gap: 20px; align-items: center; }
        .resource-item { display: flex; gap: 8px; background: rgba(10, 15, 30, 0.6); padding: 8px 15px; border-radius: 20px; font-size: 16px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .sys-btn { background: rgba(10, 15, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); color: white; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; transition: all 0.3s; }
        .sys-btn:hover { background: rgba(255, 215, 0, 0.2); border-color: #ffd700; transform: scale(1.1); }

        /* --- 左上角返回大廳導覽 --- */
        .back-nav { position: absolute; top: 100px; left: 30px; color: rgba(255,255,255,0.5); font-size: 14px; cursor: pointer; transition: 0.2s; z-index: 10; }
        .back-nav:hover { color: #fff; }

        /* --- 中央核心按鈕區 (4個主要功能) --- */
        .center-menu {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 15px; width: 450px;
        }

        .arena-btn {
            background: rgba(15, 25, 50, 0.6); border: 2px solid rgba(150, 180, 255, 0.4);
            border-radius: 60px; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(4px);
        }
        .arena-btn:hover { border-color: #ffd700; box-shadow: 0 0 25px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(255, 215, 0, 0.2); transform: scale(1.05); }

        .btn-text-box { text-align: center; flex-grow: 1; color: #fff; }
        .btn-title { font-size: 22px; font-weight: 900; letter-spacing: 6px; margin-bottom: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .btn-subtitle { font-size: 10px; color: #a0c0ff; letter-spacing: 4px; }
        .btn-side-icon { font-size: 24px; color: #ffd700; opacity: 0.8; }

        /* ================= 房間列表彈出視窗 (Modal) ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 15, 0.7); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; transition: opacity 0.3s ease;
        }

        .room-modal {
            width: 500px; max-height: 80vh; display: flex; flex-direction: column;
            background: linear-gradient(135deg, rgba(20, 30, 60, 0.95), rgba(10, 15, 30, 0.95));
            border: 2px solid #5bc0eb; border-radius: 15px; padding: 25px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(100, 150, 255, 0.2);
            transform: translateY(20px); transition: transform 0.3s ease;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(150, 180, 255, 0.3); padding-bottom: 15px; margin-bottom: 15px; }
        .modal-header h2 { font-size: 22px; letter-spacing: 3px; color: #ffd700; }
        .close-btn { background: transparent; border: none; color: #a0c0ff; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: #fff; transform: scale(1.2); }

        .room-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        
        .room-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 20px; border-radius: 8px; transition: 0.2s;
        }
        .room-item:hover { border-color: #5bc0eb; background: rgba(91, 192, 235, 0.1); }
        .room-name { font-size: 18px; font-weight: bold; letter-spacing: 2px; }
        .room-status { font-size: 12px; color: #44cc44; }
        
        .join-btn {
            background: rgba(255, 215, 0, 0.2); border: 1px solid #ffd700; color: #ffd700;
            padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .join-btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 10px #ffd700; }

        .empty-msg { text-align: center; color: #a0c0ff; padding: 30px 0; font-size: 14px; letter-spacing: 2px; }

        /* 自訂美化滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #5bc0eb; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="player-profile" onclick="goBack()">
            <img src="avatars/avatar1.png" class="avatar" id="arena-avatar" alt="玩家頭像" onerror="this.src='avatars/avatar1.png'">
            <div class="player-info">
                <span class="player-level">Lv.80</span>
                <span class="player-name" id="arena-username">星之觀測者</span>
            </div>
        </div>
        <div class="top-right-menu">
            <div class="resource-item">🪙 <span id="arena-coins">128,450</span></div>
            <div class="resource-item">💎 <span id="arena-diamonds">8,920</span></div>
            <button class="sys-btn">⚙️</button>
        </div>
    </header>

    <div class="back-nav" onclick="goBack()">← 返回大廳</div>

    <div class="center-menu">
        <div class="arena-btn" onclick="startMatchmaking()">
            <div class="btn-side-icon">✧</div>
            <div class="btn-text-box"><div class="btn-title">玩家配對</div><div class="btn-subtitle">- QUICK MATCH -</div></div>
            <div class="btn-side-icon">✧</div>
        </div>

        <div class="arena-btn" onclick="createRoom()">
            <div class="btn-side-icon">🚪</div>
            <div class="btn-text-box"><div class="btn-title">創建房間</div><div class="btn-subtitle">- CREATE ROOM -</div></div>
            <div class="btn-side-icon">🚪</div>
        </div>

        <div class="arena-btn" onclick="joinPrivateRoom()">
            <div class="btn-side-icon">🔑</div>
            <div class="btn-text-box"><div class="btn-title">加入房間</div><div class="btn-subtitle">- JOIN ROOM -</div></div>
            <div class="btn-side-icon">🔑</div>
        </div>

        <div class="arena-btn" onclick="openRoomList()">
            <div class="btn-side-icon">📜</div>
            <div class="btn-text-box"><div class="btn-title">房間列表</div><div class="btn-subtitle">- ROOM LOBBY -</div></div>
            <div class="btn-side-icon">📜</div>
        </div>
    </div>

    <div class="modal-overlay" id="roomModal">
        <div class="room-modal" id="roomCard">
            <div class="modal-header">
                <h2>可加入的房間</h2>
                <button class="close-btn" onclick="closeRoomList()">✖</button>
            </div>
            <div class="room-list" id="roomContainer">
                <div class="empty-msg">連線中...</div>
            </div>
        </div>
    </div>

    <script>
        // === 網頁載入時，從 localStorage 讀取大廳同步過來的所有資料 ===
        window.onload = function() {
            // 1. 同步玩家頭像
            const savedAvatar = localStorage.getItem('playerAvatar');
            if (savedAvatar) {
                document.getElementById('arena-avatar').src = savedAvatar;
            }
            
            // 2. 同步玩家名字
            const savedName = localStorage.getItem('playerName');
            if (savedName) {
                document.getElementById('arena-username').innerText = savedName;
            }

            // 3. 同步金幣與鑽石數量
            document.getElementById('arena-coins').innerText = localStorage.getItem('playerCoins') || "128,450";
            document.getElementById('arena-diamonds').innerText = localStorage.getItem('playerDiamonds') || "8,920";
        };

        // === WebSocket 伺服器連線設定 ===
        const ws = new WebSocket('ws://localhost:8765');

        ws.onopen = () => { console.log('✅ 成功連接到星宿伺服器！'); };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.action === "room_list_update") {
                updateRoomListUI(data.rooms);
            } else if (data.action === "waiting") {
                alert("⏳ " + data.msg); 
            } else if (data.action === "match_success") {
                alert("⚔️ 成功配對！即將進入戰場...");
                document.body.style.opacity = 0;
                setTimeout(() => { window.location.href = 'battle.html'; }, 500);
            } else if (data.action === "error") {
                alert("⚠️ " + data.msg);
            }
        };

        // === 動態更新房間列表彈窗 UI ===
        function updateRoomListUI(rooms) {
            const container = document.getElementById('roomContainer');
            container.innerHTML = ''; 

            if (rooms.length === 0) {
                container.innerHTML = '<div class="empty-msg">目前沒有可加入的房間...<br>您可以自己創建一個！</div>';
                return;
            }

            rooms.forEach(roomName => {
                const roomItem = document.createElement('div');
                roomItem.className = 'room-item';
                roomItem.innerHTML = `
                    <div>
                        <div class="room-name">${roomName}</div>
                        <div class="room-status">等待加入 (1/2)</div>
                    </div>
                    <button class="join-btn" onclick="joinRoom('${roomName}')">加入</button>
                `;
                container.appendChild(roomItem);
            });
        }

        // === 遊戲按鈕互動功能邏輯 ===
        
        function goBack() {
            document.body.style.opacity = 0;
            setTimeout(() => { window.location.href = 'game.html'; }, 500);
        }

        function startMatchmaking() {
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ action: "match" }));
            else alert("伺服器未連線。請確認 Python 伺服器是否在背景執行中。");
        }

        function createRoom() {
            if (ws.readyState === WebSocket.OPEN) {
                const pwd = prompt("為您的私人房間取個名稱或設定密碼：");
                if (pwd && pwd.trim() !== "") {
                    ws.send(JSON.stringify({ action: "create_room", password: pwd.trim() }));
                }
            } else alert("伺服器未連線。");
        }

        // 點擊清單中的加入按鈕
        function joinRoom(roomName) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "join_room", password: roomName }));
            }
        }

        // 手動輸入密碼加入房間
        function joinPrivateRoom() {
            if (ws.readyState === WebSocket.OPEN) {
                const pwd = prompt("請輸入朋友的房間名稱或密碼：");
                if (pwd && pwd.trim() !== "") {
                    ws.send(JSON.stringify({ action: "join_room", password: pwd.trim() }));
                }
            } else {
                alert("伺服器未連線。");
            }
        }

        // === 彈出視窗顯示控制 ===
        function openRoomList() {
            const modal = document.getElementById('roomModal');
            const card = document.getElementById('roomCard');
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; card.style.transform = 'translateY(0)'; }, 10);
        }

        function closeRoomList() {
            const modal = document.getElementById('roomModal');
            const card = document.getElementById('roomCard');
            modal.style.opacity = '0'; card.style.transform = 'translateY(20px)';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
    </script>
</body>
</html>
