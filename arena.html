<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿魔法師 - 星辰對決</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            /* 設定戰鬥戰場背景圖 */
            background-image: url('image_bg_battle.png');
            background-size: cover; background-position: center;
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Noto Serif TC', serif; color: #ffffff;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ================= 雙人資訊列 (HUD) ================= */
        .player-hud {
            display: flex; align-items: center; gap: 20px;
            background: linear-gradient(to right, rgba(10, 15, 30, 0.8), rgba(20, 30, 60, 0.4));
            padding: 15px 30px; border-radius: 15px; width: 450px;
            border-left: 5px solid #ffd700; border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); transition: transform 0.2s;
        }
        
        /* 對手在上方、玩家在下方 */
        .hud-enemy { align-self: flex-start; border-left-color: #ff4444; }
        .hud-self { align-self: flex-end; border-left-color: #00ccff; }

        .battle-avatar {
            width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid #fff; object-fit: cover;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .hud-enemy .battle-avatar { border-color: #ff4444; box-shadow: 0 0 15px rgba(255, 68, 68, 0.4); }
        .hud-self .battle-avatar { border-color: #00ccff; box-shadow: 0 0 15px rgba(0, 204, 255, 0.4); }

        .status-bars { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .name-tag { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 2px 4px #000; }
        
        /* 核心計量條外框 */
        .bar-container { position: relative; width: 100%; height: 16px; background: rgba(0,0,0,0.6); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .bar-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; font-family: monospace; z-index: 2; text-shadow: 0 1px 2px #000; }
        
        /* 血條動態填滿區 */
        .hp-fill { 
            height: 100%; width: 100%; 
            background: linear-gradient(to right, #ff4444, #ffaa00);
            transition: width 0.4s cubic-bezier(0.075, 0.82, 0.165, 1); /* 平滑扣血精髓 */
        }
        .hud-self .hp-fill { background: linear-gradient(to right, #00ccff, #00ffaa); }

        /* 魔力條動態填滿區 */
        .mp-fill { height: 100%; width: 100%; background: linear-gradient(to right, #9933ff, #e066ff); transition: width 0.3s ease; }

        /* 被攻擊時的外框震動動畫特效 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .damaged-shake { animation: shake 0.3s ease-in-out; }

        /* ================= 中央戰場與日誌 ================= */
        .center-battlefield {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .action-log {
            width: 100%; background: rgba(5, 10, 20, 0.7); border: 1px solid rgba(150, 180, 255, 0.2);
            border-radius: 10px; padding: 15px; height: 120px; overflow-y: auto;
            font-size: 14px; line-height: 1.6; color: #a0c0ff; backdrop-filter: blur(3px);
        }
        .log-entry { margin-bottom: 5px; animation: logFade 0.3s ease; }
        @keyframes logFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= 右側：快捷測試面板 ================= */
        .test-panel {
            position: absolute; right: 30px; top: 50%; transform: translateY(-50%);
            background: rgba(15, 20, 35, 0.9); border: 2px solid #ffd700; border-radius: 12px;
            padding: 20px; display: flex; flex-direction: column; gap: 12px; width: 220px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 20;
        }
        .test-title { font-size: 14px; color: #ffd700; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
        .test-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); color: #fff;
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s;
        }
        .test-btn.dmg-enemy { border-color: #ff4444; color: #ff8888; }
        .test-btn.dmg-enemy:hover { background: rgba(255,68,68,0.2); transform: scale(1.05); }
        .test-btn.dmg-self { border-color: #00ccff; color: #88e5ff; }
        .test-btn.dmg-self:hover { background: rgba(0,204,255,0.2); transform: scale(1.05); }
        .test-btn.heal { border-color: #44cc44; color: #88ff88; }
        .test-btn.heal:hover { background: rgba(68,204,68,0.2); transform: scale(1.05); }

        /* 逃跑退場按鈕 */
        .escape-btn { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 14px; cursor: pointer; text-decoration: underline; margin-top: 10px; text-align: center; }
        .escape-btn:hover { color: #ff4444; }
    </style>
</head>
<body>

    <!-- 1. 上方區塊：對手資訊 HUD -->
    <div class="player-hud hud-enemy" id="hud-enemy">
        <img src="avatars/avatar3.png" class="battle-avatar" alt="對手頭像" onerror="this.src='avatars/avatar3.png'">
        <div class="status-bars">
            <div class="name-tag">暗影使徒 ❖</div>
            <!-- 對手血條 -->
            <div class="bar-container">
                <div class="bar-text" id="enemy-hp-text">HP: 100 / 100</div>
                <div class="hp-fill" id="enemy-hp-bar" style="width: 100%;"></div>
            </div>
            <!-- 對手魔力條 -->
            <div class="bar-container" style="height: 10px;">
                <div class="mp-fill" id="enemy-mp-bar" style="width: 100%;"></div>
            </div>
        </div>
    </div>

    <!-- 2. 中央區塊：戰場日誌監控 -->
    <div class="center-battlefield">
        <div class="action-log" id="combatLog">
            <div class="log-entry" style="color: #ffd700;">★ 星辰結界已展開，對決正式開始！</div>
        </div>
    </div>

    <!-- 3. 下方區塊：玩家自身資訊 HUD -->
    <div class="player-hud hud-self" id="hud-self">
        <!-- 會自動讀取大廳頭像 -->
        <img src="avatars/avatar1.png" class="battle-avatar" id="battle-self-avatar" alt="我的頭像" onerror="this.src='avatars/avatar1.png'">
        <div class="status-bars">
            <!-- 會自動讀取大廳暱稱 -->
            <div class="name-tag" id="battle-self-name">星之觀測者</div>
            <!-- 玩家自身血條 -->
            <div class="bar-container">
                <div class="bar-text" id="self-hp-text">HP: 100 / 100</div>
                <div class="hp-fill" id="self-hp-bar" style="width: 100%;"></div>
            </div>
            <!-- 玩家自身魔力條 -->
            <div class="bar-container" style="height: 10px;">
                <div class="mp-fill" id="self-mp-bar" style="width: 100%;"></div>
            </div>
        </div>
    </div>

    <!-- 4. 右側工具：超酷手動調血量測試面板 -->
    <div class="test-panel">
        <div class="test-title">🧙‍♂️ 戰場觀測調校面板</div>
        <button class="test-btn dmg-enemy" onclick="executeAction('enemy_damage', 20)">🔥 轟炸對手 (-20 HP)</button>
        <button class="test-btn dmg-self" onclick="executeAction('self-damage', 15)">⚡ 對手打我 (-15 HP)</button>
        <button class="test-btn heal" onclick="executeAction('heal_all', 25)">✨ 聖光集體治療 (+25)</button>
        <button class="test-btn" onclick="executeAction('use_mp', 30)">🔮 消耗我的魔力 (-30)</button>
        <button class="escape-btn" onclick="escapeBattle()">🏳️ 認輸撤離戰場</button>
    </div>

    <script>
        // === 戰場核心血量與魔力變數 ===
        let selfHP = 100;
        let selfMP = 100;
        let enemyHP = 100;
        let enemyMP = 100;

        // === 初始化：自動載入大廳設定好的形象與暱稱 ===
        window.onload = function() {
            const savedAvatar = localStorage.getItem('playerAvatar');
            if (savedAvatar) {
                document.getElementById('battle-self-avatar').src = savedAvatar;
            }
            const savedName = localStorage.getItem('playerName');
            if (savedName) {
                document.getElementById('battle-self-name').innerText = savedName;
            }
        };

        // === 動態更動血量與魔力的核心函數 ===
        function executeAction(actionType, amount) {
            const logBox = document.getElementById('combatLog');
            let logText = "";

            if (actionType === 'enemy_damage') {
                // 扣除對手血量，最低限制為 0
                enemyHP = Math.max(0, enemyHP - amount);
                logText = `⚔️ 你吟唱了星辰裂變，對【暗影使徒】造成了 ${amount} 點暴擊傷害！`;
                
                // 觸發對手 HUD 畫面震動受擊特效
                triggerShake('hud-enemy');
            } 
            else if (actionType === 'self-damage') {
                // 扣除自身血量
                selfHP = Math.max(0, selfHP - amount);
                logText = `💥 敵方發動了暗影侵蝕，你受到了 ${amount} 點痛擊！`;
                
                // 觸發自身 HUD 畫面震動受擊特效
                triggerShake('hud-self');
            } 
            else if (actionType === 'heal_all') {
                // 集體回血，最高限制為 100
                selfHP = Math.min(100, selfHP + amount);
                enemyHP = Math.min(100, enemyHP + amount);
                selfMP = Math.min(100, selfMP + amount);
                enemyMP = Math.min(100, enemyMP + amount);
                logText = `✨ 戰場降下璀璨極光，所有人恢復了 ${amount} 點生命與魔力！`;
            }
            else if (actionType === 'use_mp') {
                selfMP = Math.max(0, selfMP - amount);
                logText = `🔮 你消耗了 ${amount} 點魔力引導高階星宿法陣。`;
            }

            // === 驅動前端 UI 畫面更新填滿寬度與文字 ===
            // 自身數據渲染
            document.getElementById('self-hp-bar').style.width = selfHP + '%';
            document.getElementById('self-hp-text').innerText = `HP: ${selfHP} / 100`;
            document.getElementById('self-mp-bar').style.width = selfMP + '%';

            // 對手數據渲染
            document.getElementById('enemy-hp-bar').style.width = enemyHP + '%';
            document.getElementById('enemy-hp-text').innerText = `HP: ${enemyHP} / 100`;
            document.getElementById('enemy-mp-bar').style.width = enemyMP + '%';

            // 寫入戰鬥日誌
            const newLog = document.createElement('div');
            newLog.className = 'log-entry';
            newLog.innerText = logText;
            logBox.appendChild(newLog);
            logBox.scrollTop = logBox.scrollHeight; // 自動捲動到最下面

            // 勝負評判檢測
            checkBattleOver();
        }

        // === 畫面受擊震動小特效 ===
        function triggerShake(elementId) {
            const el = document.getElementById(elementId);
            el.classList.add('damaged-shake');
            // 動態完畢後立刻把 class 拔掉，下一次才能重複觸發
            setTimeout(() => { el.classList.remove('damaged-shake'); }, 300);
        }

        // === 檢測生死勝負 ===
        function checkBattleOver() {
            if (selfHP <= 0) {
                alert("💀 你的生命歸零，敗給了暗影力量... 即將返回競技大廳。");
                escapeBattle();
            } else if (enemyHP <= 0) {
                alert("🏆 勝利！你成功的封印了對手！即將衣錦還鄉返回大廳。");
                escapeBattle();
            }
        }

        // === 認輸/退出戰場 ===
        function escapeBattle() {
            document.body.style.opacity = 0;
            setTimeout(() => {
                window.location.href = 'arena.html';
            }, 500);
        }

        // === 預留：未來的 WebSocket 真實連線通道 ===
        // const ws = new WebSocket('ws://localhost:8765');
        // ws.onmessage = (event) => { 
        //     const data = JSON.parse(event.data);
        //     // 未來對手出牌扣血，只要在這裡接收並呼叫 executeAction() 即可！
        // };
    </script>
</body>
</html>
