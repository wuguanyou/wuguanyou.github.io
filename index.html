<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿魔法師 ASTRAL CHRONICLE</title>
    <!-- 引入高質感的思源宋體，符合魔法與星空的優雅氛圍 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        /* 重置基本樣式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 防止文字被選取，更有遊戲感 */
        }

        body {
            /* 設定你的圖片為背景 */
            background-image: url('image_4dc6fa.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 防止滾動條 */
            font-family: 'Noto Serif TC', serif;
            color: #ffffff;
        }

        /* 遊戲主要畫面容器 */
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
            /* 加上一層非常淡的黑色漸層，讓左側文字更清楚 */
            background: linear-gradient(to right, rgba(0,0,15,0.6) 0%, rgba(0,0,15,0) 50%);
        }

        /* 左側選單區域排版 */
        .left-menu {
            position: absolute;
            top: 15%;
            left: 8%;
            display: flex;
            flex-direction: column;
            gap: 30px; /* 標題與按鈕群的間距 */
        }

        /* 標題區塊 */
        .title-area {
            margin-bottom: 20px;
            /* 為了避免與原圖文字重疊太嚴重，這裡如果原圖已經有字，可以考慮隱藏。
               但為了示範特效，我先把文字排出來 */
        }
        
        .main-title {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(100, 150, 255, 0.5);
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 20px;
            letter-spacing: 8px;
            color: #d0e0ff;
        }

        .tagline {
            font-size: 16px;
            margin-top: 15px;
            letter-spacing: 3px;
            color: #ffd700; /* 星光般的金色 */
        }

        /* 按鈕群組 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 個別按鈕設計 */
        .menu-btn {
            background: transparent;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            transition: all 0.3s ease; /* 動畫過渡效果 */
            width: fit-content;
        }

        .menu-btn:hover {
            transform: translateX(15px) scale(1.05); /* 滑鼠碰到時向右移動並稍微放大 */
            text-shadow: 0 0 15px #fff, 0 0 30px #5bc0eb;
        }

        .btn-icon {
            font-size: 28px;
            color: #ffd700;
            transition: transform 0.3s ease;
        }

        .menu-btn:hover .btn-icon {
            transform: rotate(90deg); /* 圖示旋轉特效 */
        }

        .btn-text-cn {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 3px;
            display: block;
        }

        .btn-text-en {
            font-size: 12px;
            letter-spacing: 2px;
            color: #a0c0ff;
            display: block;
            margin-top: 2px;
        }

        /* 左下角版本號 */
        .version {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-family: sans-serif;
        }

        /* 右下角公告按鈕 */
        .notice-btn {
            position: absolute;
            bottom: 30px;
            right: 50px;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }

        .notice-btn:hover {
            transform: scale(1.1);
            text-shadow: 0 0 10px #fff;
        }

        .notice-icon {
            font-size: 32px;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 左側主選單 -->
        <div class="left-menu">
            <!-- 標題區 (如果之後背景圖去除了文字，這塊就能完美填補) -->
            <div class="title-area">
                <h1 class="main-title">星宿魔法師</h1>
                <div class="sub-title">ASTRAL CHRONICLE</div>
                <div class="tagline">✧ 群星為引 · 命運為軌 ✧</div>
            </div>

            <!-- 按鈕區 -->
            <div class="button-group">
                <button class="menu-btn" onclick="startGame()">
                    <span class="btn-icon">✧</span>
                    <div>
                        <span class="btn-text-cn">開始觀測</span>
                        <span class="btn-text-en">START GAME</span>
                    </div>
                </button>

                <button class="menu-btn" onclick="openGallery()">
                    <span class="btn-icon">◈</span>
                    <div>
                        <span class="btn-text-cn">星宿圖鑑</span>
                        <span class="btn-text-en">GALLERY</span>
                    </div>
                </button>

                <button class="menu-btn" onclick="openChronicle()">
                    <span class="btn-icon">✦</span>
                    <div>
                        <span class="btn-text-cn">命運紀錄</span>
                        <span class="btn-text-en">CHRONICLE</span>
                    </div>
                </button>

                <button class="menu-btn" onclick="openSettings()">
                    <span class="btn-icon">❂</span>
                    <div>
                        <span class="btn-text-cn">設定</span>
                        <span class="btn-text-en">SETTINGS</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- 左下角 -->
        <div class="version">Ver.1.0.0</div>

        <!-- 右下角公告 -->
        <button class="notice-btn" onclick="openNotice()">
            <span class="notice-icon">🎁</span>
            <span style="font-size: 14px; letter-spacing: 1px;">公告</span>
        </button>
    </div>

    <!-- JavaScript 互動邏輯 -->
    <script>
        function startGame() {
            // 這裡可以寫進入遊戲的邏輯，例如跳轉到遊戲主畫面 (game.html)
            // window.location.href = 'game.html';
            alert("✨ 系統提示：正在連線至星宿伺服器... 準備進入遊戲！");
        }

        function openGallery() {
            alert("📖 開啟星宿圖鑑介面");
        }

        function openChronicle() {
            alert("📜 開啟命運紀錄介面");
        }

        function openSettings() {
            alert("⚙️ 開啟遊戲設定");
        }

        function openNotice() {
            alert("🎁 最新公告：歡迎來到《星宿魔法師》Beta 測試！");
        }
    </script>
</body>
</html>
