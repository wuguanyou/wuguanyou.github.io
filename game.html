<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿魔法師 - 星辰大廳</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            /* 設定大廳背景圖 */
            background-image: url('bg_lobby.png');
            background-size: cover; background-position: center;
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Noto Serif TC', serif; color: #ffffff;
            animation: fadeIn 0.8s ease forwards;
            transition: opacity 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 頂部資訊列 --- */
        header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; }
        
        .player-profile {
            display: flex; align-items: center; gap: 15px; background: rgba(10, 15, 30, 0.6);
            padding: 10px 20px 10px 10px; border-radius: 50px; border: 1px solid rgba(200, 180, 100, 0.3);
            backdrop-filter: blur(5px); cursor: pointer; transition: transform 0.2s;
        }
        .player-profile:hover { transform: scale(1.05); border-color: rgba(255, 215, 0, 0.8); }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ffd700; background: #fff; display: flex; justify-content: center; align-items: center; color: #333; font-weight: bold; }
        .player-level { font-size: 14px; color: #ffd700; font-weight: bold; }
        .player-name { font-size: 18px; letter-spacing: 2px; }

        .top-right-menu { display: flex; gap: 20px; align-items: center; }
        .resource-item { display: flex; gap: 8px; background: rgba(10, 15, 30, 0.6); padding: 8px 15px; border-radius: 20px; font-size: 16px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .sys-btn { background: rgba(10, 15, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); color: white; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; transition: all 0.3s; }
        .sys-btn:hover { background: rgba(255, 215, 0, 0.2); border-color: #ffd700; transform: rotate(15deg) scale(1.1); }

        /* --- 四大功能卡牌 --- */
        .cards-container { position: absolute; bottom: 10%; right: 5%; display: flex; gap: 20px; z-index: 10; }
        .action-card {
            width: 180px; height: 380px; background: linear-gradient(to bottom, rgba(20, 30, 60, 0.4), rgba(10, 15, 30, 0.8));
            border: 1px solid rgba(150, 180, 255, 0.3); border-radius: 10px; cursor: pointer; position: relative;
