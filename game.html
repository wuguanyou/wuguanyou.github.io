<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿魔法師 - 星辰大廳</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            /* 設定大廳背景圖 */
            background-image: url('bg_lobby.jpg');
            background-size: cover; background-position: center;
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Noto Serif TC', serif; color: #ffffff;
            animation: fadeIn 0.8s ease forwards;
            transition: opacity 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 頂部資訊列 --- */
        header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; }
        
        .player-profile {
            display: flex; align-items: center; gap: 15px; background: rgba(10, 15, 30, 0.6);
            padding: 10px 20px 10px 10px; border-radius: 50px; border: 1px solid rgba(200, 180, 100, 0.3);
            backdrop-filter: blur(5px); cursor: pointer; transition: transform 0.2s;
        }
        .player-profile:hover { transform: scale(1.05); border-color: rgba(255, 215, 0, 0.8); }
        
        /* 左上角小頭像 */
        .avatar { 
            width: 60px; height: 60px; border-radius: 50%; 
            border: 2px solid #ffd700; background: #fff; 
            object-fit: cover; /* 確保圖片不變形填滿圓形 */
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .player-level { font-size: 14px; color: #ffd700; font-weight: bold; }
        .player-name { font-size: 18px; letter-spacing: 2px; }

        .top-right-menu { display: flex; gap: 20px; align-items: center; }
        .resource-item { display: flex; gap: 8px; background: rgba(10, 15, 30, 0.6); padding: 8px 15px; border-radius: 20px; font-size: 16px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .sys-btn { background: rgba(10, 15, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); color: white; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; transition: all 0.3s; }
        .sys-btn:hover { background: rgba(255, 215, 0, 0.2); border-color: #ffd700; transform: rotate(15deg) scale(1.1); }

        /* --- 四大功能卡牌 --- */
        .cards-container { position: absolute; bottom: 10%; right: 5%; display: flex; gap: 20px; z-index: 10; }
        .action-card {
            width: 180px; height: 380px; background: linear-gradient(to bottom, rgba(20, 30, 60, 0.4), rgba(10, 15, 30, 0.8));
            border: 1px solid rgba(150, 180, 255, 0.3); border-radius: 10px; cursor: pointer; position: relative;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(2px);
        }
        .action-card:hover { transform: translateY(-20px) scale(1.05); border-color: #ffd700; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 215, 0, 0.4) inset; }
        .card-icon { position: absolute; top: 20px; font-size: 30px; color: #ffd700; }
        .card-title { font-size: 26px; font-weight: 900; letter-spacing: 4px; margin-bottom: 8px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .card-subtitle { font-size: 13px; color: #a0c0ff; letter-spacing: 2px; }

        /* --- 返回按鈕 --- */
        .back-home { position: absolute; bottom: 20px; left: 20px; background: transparent; color: rgba(255,255,255,0.5); border: none; cursor: pointer; font-size: 16px; z-index: 10; }
        .back-home:hover { color: white; }

        /* ================= 玩家名片彈出視窗 (Modal) ================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 15, 0.7);
            backdrop-filter: blur(8px);
            display: none; /* 預設隱藏 */
            justify-content: center;
            align-items: center;
            z-index: 100; /* 確保浮在最上層 */
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .profile-card {
            width: 600px;
            background: linear-gradient(135deg, rgba(20, 30, 60, 0.95), rgba(10, 15, 30, 0.95));
            border: 2px solid #5bc0eb;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(100, 150, 255, 0.2);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        /* 關閉按鈕 */
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: transparent; border: none;
            color: #a0c0ff; font-size: 24px; cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { color: #fff; transform: scale(1.2); }

        /* 名片上半部：大頭貼與名稱 */
        .profile-header {
            display: flex; align-items: center; gap: 25px;
            border-bottom: 1px solid rgba(150, 180, 255, 0.3);
            padding-bottom: 20px; margin-bottom: 20px;
        }

        /* 彈出名片裡的大頭像 */
        .profile-avatar-large {
            width: 100px; height: 100px; border-radius: 50%; 
            border: 3px solid #ffd700; background: #fff; 
            object-fit: cover;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .profile-details h2 { font-size: 28px; letter-spacing: 3px; margin-bottom: 5px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .profile-uid { color: #a0c0ff; font-size: 14px; letter-spacing: 1px; margin-bottom: 10px; }

        /* 經驗值條 */
        .exp-container { width: 300px; }
        .exp-text { display: flex; justify-content: space-between; font-size: 12px; color: #ffd700; margin-bottom: 5px; }
        .exp-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .exp-bar-fill { width: 75%; height: 100%; background: linear-gradient(to right, #ffd700, #ffaa00); }

        /* 名片下半部：數據統計 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(150, 180, 255, 0.2);
            border-radius: 8px; padding: 15px 10px;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #a0c0ff; letter-spacing: 2px; }
    </style>
</head>
<body>
    
    <header>
        <div class="player-profile" onclick="openProfile()">
            <img src="avatar.jpg" class="avatar" alt="玩家頭像">
            <div style="display: flex; flex-direction: column;">
                <span class="player-level">Lv.80</span>
                <span class="player-name">星之觀測者</span>
            </div>
        </div>
        <div class="top-right-menu">
            <div class="resource-item">🪙 128,450 +</div>
            <div class="resource-item">💎 8,920 +</div>
            <button class="sys-btn" onclick="alert('開啟設定')">⚙️</button>
        </div>
    </header>

    <div class="cards-container">
        <div class="action-card" onclick="enterArena()">
            <div class="card-icon">✧</div>
            <div class="card-title">對戰配對</div>
            <div class="card-subtitle">進入星辰競技場</div>
        </div>
        <div class="action-card" onclick="alert('進入卡牌編輯')">
            <div class="card-icon">◈</div>
            <div class="card-title">卡牌編輯</div>
            <div class="card-subtitle">組建專屬卡組</div>
        </div>
        <div class="action-card" onclick="alert('進入星宿召喚')">
            <div class="card-icon">✦</div>
            <div class="card-title">星宿召喚</div>
            <div class="card-subtitle">召喚星辰使徒</div>
        </div>
        <div class="action-card" onclick="alert('開啟圖鑑')">
            <div class="card-icon">❂</div>
            <div class="card-title">圖鑑</div>
            <div class="card-subtitle">查看收集圖鑑</div>
        </div>
    </div>

    <button class="back-home" onclick="goBack()">← 返回星盤</button>

    <div class="modal-overlay" id="profileModal">
        <div class="profile-card" id="profileCard">
            <button class="close-btn" onclick="closeProfile()">✖</button>
            
            <div class="profile-header">
                <img src="avatar.jpg" class="profile-avatar-large" alt="玩家頭像">
                <div class="profile-details">
                    <h2>星之觀測者</h2>
                    <div class="profile-uid">UID: 1029384756</div>
                    
                    <div class="exp-container">
                        <div class="exp-text">
                            <span>Lv.80</span>
                            <span>24,500 / 30,000 EXP</span>
                        </div>
                        <div class="exp-bar-bg">
                            <div class="exp-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value">128</div>
                    <div class="stat-label">進行對局</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" style="color: #44cc44;">68%</div>
                    <div class="stat-label">競技勝率</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" style="color: #ffd700;">42/50</div>
                    <div class="stat-label">星宿收集</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === 頁面跳轉邏輯 ===
        
        function enterArena() {
            document.body.style.opacity = 0;
            setTimeout(() => {
                window.location.href = 'arena.html';
            }, 500);
        }

        function goBack() {
            document.body.style.opacity = 0;
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }

        // === 玩家名片彈出視窗邏輯 ===

        function openProfile() {
            const modal = document.getElementById('profileModal');
            const card = document.getElementById('profileCard');
            
            modal.style.display = 'flex'; 
            
            setTimeout(() => {
                modal.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 10);
        }

        function closeProfile() {
            const modal = document.getElementById('profileModal');
            const card = document.getElementById('profileCard');
            
            modal.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }
    </script>
</body>
</html>
