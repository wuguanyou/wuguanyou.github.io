<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿魔法師 - 星辰對決</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; /* 禁用預設滾動，防拖曳干擾 */ }
        
        body {
            background-image: url('image_bg_battle.png');
            background-size: cover; background-position: center;
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Noto Serif TC', serif; color: #ffffff;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px 40px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ================= 雙方區域容器 ================= */
        .player-zone { display: flex; flex-direction: column; gap: 15px; position: relative; }
        .enemy-zone { align-items: center; z-index: 1; }
        .self-zone { align-items: center; z-index: 10; /* 我方層級調高，拖曳才不會被擋住 */ }

        /* ================= 主戰者資訊列 (HUD) ================= */
        .player-hud {
            display: flex; align-items: center; gap: 15px;
            background: linear-gradient(to right, rgba(10, 15, 30, 0.8), rgba(20, 30, 60, 0.6));
            padding: 10px 20px; border-radius: 50px; width: 400px;
            border: 2px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);
        }
        .hud-enemy { border-color: #ff4444; }
        .hud-self { border-color: #00ccff; }

        .battle-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .status-bars { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .name-tag { font-size: 16px; font-weight: bold; text-shadow: 0 2px 4px #000; }
        
        .bar-container { position: relative; width: 100%; height: 14px; background: rgba(0,0,0,0.6); border-radius: 7px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .bar-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; z-index: 2; }
        
        .hp-fill { height: 100%; width: 100%; transition: width 0.4s ease; }
        .hud-enemy .hp-fill { background: linear-gradient(to right, #ff4444, #ffaa00); }
        .hud-self .hp-fill { background: linear-gradient(to right, #00ccff, #00ffaa); }

        /* ================= 戰場角色卡牌區域 (四星宿) ================= */
        .board-row { display: flex; gap: 20px; justify-content: center; position: relative; }
        
        .char-card {
            width: 100px; height: 140px;
            background: linear-gradient(to bottom, rgba(30, 40, 60, 0.9), rgba(10, 15, 25, 0.9));
            border: 2px solid #5bc0eb; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; padding: 5px;
            position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            /* 預設加入平滑過渡 */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }
        .enemy-card { border-color: #ff4444; }
        
        /* 拖曳狀態專用樣式 */
        .self-card { cursor: grab; }
        .self-card:active { cursor: grabbing; }
        .self-card.dragging { z-index: 100; box-shadow: 0 15px 30px rgba(91, 192, 235, 0.8); border-color: #ffd700; }
        
        .char-card.dead { filter: grayscale(100%) brightness(0.4); border-color: #555; pointer-events: none; }
        .char-card:hover:not(.dead):not(.dragging) { transform: translateY(-10px) scale(1.05); box-shadow: 0 0 15px #ffd700; border-color: #ffd700; z-index: 10; }

        .char-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.3); margin-top: 5px; pointer-events: none; }
        .char-name { font-size: 12px; font-weight: bold; color: #e0e0e0; margin-top: 5px; letter-spacing: 1px; pointer-events: none; }

        .char-stats {
            display: flex; justify-content: space-between; width: 100%;
            position: absolute; bottom: 5px; padding: 0 10px; font-size: 16px; font-weight: 900;
            text-shadow: 0 0 4px #000, 0 0 4px #000; pointer-events: none;
        }
        .stat-atk { color: #ffcc00; display: flex; align-items: center; gap: 2px; }
        .stat-atk::before { content: "⚔️"; font-size: 12px; }
        .stat-hp { color: #ff4444; display: flex; align-items: center; gap: 2px; }
        .stat-hp::before { content: "❤️"; font-size: 12px; }

        /* 受擊與攻擊動畫 */
        @keyframes damageShake { 0%, 100% { transform: translateX(0); filter: brightness(1); } 25%, 75% { transform: translateX(-5px); filter: brightness(1.5) drop-shadow(0 0 10px red); } 50% { transform: translateX(5px); } }
        .taking-damage { animation: damageShake 0.4s ease; }
        
        /* 拖曳放開後的衝鋒動畫 */
        @keyframes attackDashSelf { 0%, 100% { transform: translateY(0); } 40%, 60% { transform: translateY(-150px) scale(1.1); z-index: 50; } }
        @keyframes attackDashEnemy { 0%, 100% { transform: translateY(0); } 40%, 60% { transform: translateY(150px) scale(1.1); z-index: 50; } }
        .attacking-self { animation: attackDashSelf 0.5s ease !important; }
        .attacking-enemy { animation: attackDashEnemy 0.5s ease !important; }

        /* ================= 中央戰場日誌 ================= */
        .center-battlefield { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 10px 0; position: relative; }
        .drag-indicator { position: absolute; font-size: 16px; color: rgba(255, 215, 0, 0.4); letter-spacing: 2px; top: 10px; pointer-events: none; }
        .action-log {
            width: 500px; background: rgba(5, 10, 20, 0.5); border: 1px solid rgba(150, 180, 255, 0.2);
            border-radius: 10px; padding: 15px; height: 100px; overflow-y: auto;
            font-size: 13px; line-height: 1.6; color: #a0c0ff; backdrop-filter: blur(2px);
            z-index: 1;
        }
        .log-entry { margin-bottom: 5px; animation: logFade 0.3s ease; }
        @keyframes logFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= 右側：快捷測試面板 ================= */
        .test-panel {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: rgba(15, 20, 35, 0.9); border: 2px solid #ffd700; border-radius: 12px;
            padding: 15px; display: flex; flex-direction: column; gap: 10px; width: 200px; z-index: 100;
        }
        .test-title { font-size: 13px; color: #ffd700; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        .test-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .test-btn:hover { background: rgba(255,215,0,0.2); border-color: #ffd700; }
        .escape-btn { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 5px; text-align: center; }
        .escape-btn:hover { color: #ff4444; }

    </style>
</head>
<body>

    <div class="player-zone enemy-zone">
        <div class="player-hud hud-enemy" id="hud-enemy">
            <img src="avatars/avatar3.png" class="battle-avatar">
            <div class="status-bars">
                <div class="name-tag">暗影大魔導</div>
                <div class="bar-container">
                    <div class="bar-text" id="enemy-hp-text">HP: 30 / 30</div>
                    <div class="hp-fill" id="enemy-hp-bar" style="width: 100%;"></div>
                </div>
            </div>
        </div>
        
        <div class="board-row" id="enemy-board">
            </div>
    </div>

    <div class="center-battlefield">
        <div class="drag-indicator">⬆ 將角色往上拖曳出陣攻擊 ⬆</div>
        <div class="action-log" id="combatLog">
            <div class="log-entry" style="color: #ffd700;">★ 雙方星宿皆已佈陣，對決正式開始！</div>
        </div>
    </div>

    <div class="player-zone self-zone">
        <div class="board-row" id="self-board">
            </div>

        <div class="player-hud hud-self" id="hud-self">
            <img src="avatars/avatar1.png" class="battle-avatar" id="battle-self-avatar">
            <div class="status-bars">
                <div class="name-tag" id="battle-self-name">星之觀測者</div>
                <div class="bar-container">
                    <div class="bar-text" id="self-hp-text">HP: 30 / 30</div>
                    <div class="hp-fill" id="self-hp-bar" style="width: 100%;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="test-panel">
        <div class="test-title">⚔️ 觀測者面板</div>
        <button class="test-btn" onclick="enemyRandomAttack()">🔴 敵方隨機發起攻擊</button>
        <button class="test-btn" onclick="testDirectDamage('self')">⚡ 敵方技能轟炸主戰者</button>
        <button class="escape-btn" onclick="escapeBattle()">🏳️ 撤離戰場</button>
    </div>

    <script>
        // === 主戰者血量 ===
        let mainHp = { self: 30, enemy: 30 };

        // === 星宿角色資料 ===
        const selfCharacters = [
            { id: 's0', name: '青龍武士', img: 'avatars/avatar1.png', atk: 3, hp: 5, maxHp: 5, dead: false },
            { id: 's1', name: '烈焰朱雀', img: 'avatars/avatar1.png', atk: 4, hp: 3, maxHp: 3, dead: false },
            { id: 's2', name: '大地玄武', img: 'avatars/avatar1.png', atk: 1, hp: 7, maxHp: 7, dead: false },
            { id: 's3', name: '迅雷白虎', img: 'avatars/avatar1.png', atk: 5, hp: 2, maxHp: 2, dead: false }
        ];

        const enemyCharacters = [
            { id: 'e0', name: '暗影刺客', img: 'avatars/avatar3.png', atk: 4, hp: 2, maxHp: 2, dead: false },
            { id: 'e1', name: '深淵巨魔', img: 'avatars/avatar3.png', atk: 2, hp: 6, maxHp: 6, dead: false },
            { id: 'e2', name: '亡靈巫師', img: 'avatars/avatar3.png', atk: 3, hp: 4, maxHp: 4, dead: false },
            { id: 'e3', name: '恐懼之眼', img: 'avatars/avatar3.png', atk: 1, hp: 8, maxHp: 8, dead: false }
        ];

        // 拖曳相關變數
        let isDragging = false;
        let activeCardDOM = null;
        let startY = 0;
        let startX = 0;

        window.onload = function() {
            // 1. 讀取大廳資料
            const savedAvatar = localStorage.getItem('playerAvatar');
            if (savedAvatar) {
                document.getElementById('battle-self-avatar').src = savedAvatar;
                selfCharacters.forEach(c => c.img = savedAvatar); 
            }
            const savedName = localStorage.getItem('playerName');
            if (savedName) document.getElementById('battle-self-name').innerText = savedName;

            // 2. 渲染陣列
            renderBoard('self-board', selfCharacters, 'self-card');
            renderBoard('enemy-board', enemyCharacters, 'enemy-card');
        };

        // === 渲染戰場 ===
        function renderBoard(containerId, characters, customClass) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            
            characters.forEach((char) => {
                const card = document.createElement('div');
                card.className = `char-card ${customClass}`;
                card.id = char.id;
                if (char.dead) card.classList.add('dead');

                card.innerHTML = `
                    <img src="${char.img}" class="char-img">
                    <div class="char-name">${char.name}</div>
                    <div class="char-stats">
                        <span class="stat-atk" id="${char.id}-atk">${char.atk}</span>
                        <span class="stat-hp" id="${char.id}-hp">${char.hp}</span>
                    </div>
                `;
                container.appendChild(card);

                // 如果是我方卡牌，綁定拖曳 Pointer Events
                if (customClass === 'self-card') {
                    bindDragEvents(card, char);
                }
            });
        }

        // ================= 核心：拖曳出陣邏輯 =================
        function bindDragEvents(cardDOM, charData) {
            cardDOM.addEventListener('pointerdown', (e) => {
                if(charData.dead || cardDOM.classList.contains('attacking-self')) return;
                isDragging = true;
                activeCardDOM = cardDOM;
                startY = e.clientY;
                startX = e.clientX;
                cardDOM.style.transition = 'none'; // 暫停 CSS 動畫，跟隨游標
                cardDOM.classList.add('dragging');
                cardDOM.setPointerCapture(e.pointerId);
            });

            cardDOM.addEventListener('pointermove', (e) => {
                if (!isDragging || activeCardDOM !== cardDOM) return;
                let deltaY = e.clientY - startY;
                let deltaX = e.clientX - startX;
                if (deltaY > 0) deltaY = 0; // 只允許往上(前方)拖
                cardDOM.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${deltaX * 0.05}deg)`;
            });

            const releaseHandler = (e) => {
                if (!isDragging || activeCardDOM !== cardDOM) return;
                isDragging = false;
                activeCardDOM = null;
                cardDOM.releasePointerCapture(e.pointerId);
                cardDOM.classList.remove('dragging');
                cardDOM.style.transition = ''; // 恢復 CSS 動畫

                let deltaY = e.clientY - startY;
                if (deltaY < -100) {
                    // 拖曳超過閾值，發動攻擊！
                    executeDragAttack(charData, cardDOM);
                } else {
                    // 距離不夠，彈回原位
                    cardDOM.style.transform = '';
                }
            };

            cardDOM.addEventListener('pointerup', releaseHandler);
            cardDOM.addEventListener('pointercancel', releaseHandler);
        }

        // 執行拖曳後的自動尋敵與攻擊結算
        function executeDragAttack(attackerChar, attackerDOM) {
            attackerDOM.style.transform = ''; // 清除拖曳行跡
            attackerDOM.classList.add('attacking-self'); // 播放衝鋒動畫

            setTimeout(() => {
                // 尋找存活的敵人
                const aliveEnemies = enemyCharacters.filter(c => !c.dead);
                
                if (aliveEnemies.length > 0) {
                    // 隨機選一個存活敵人撞上去
                    const target = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                    target.hp -= attackerChar.atk;
                    attackerChar.hp -= target.atk; // 敵人反擊
                    
                    triggerShake(target.id);
                    triggerShake(attackerChar.id);
                    addLog(`⚔️ 【${attackerChar.name}】出陣，與【${target.name}】激烈交鋒！雙方互扣血量。`);
                    
                    checkDeath(target);
                    checkDeath(attackerChar);
                    updateCardUI(target);
                    updateCardUI(attackerChar);
                } else {
                    // 敵方全滅，直接攻擊主戰者！
                    mainHp.enemy -= attackerChar.atk;
                    triggerShake('hud-enemy');
                    document.getElementById('enemy-hp-bar').style.width = (mainHp.enemy / 30 * 100) + '%';
                    document.getElementById('enemy-hp-text').innerText = `HP: ${mainHp.enemy} / 30`;
                    addLog(`🔥 敵方前排已空！【${attackerChar.name}】直取敵方主戰者，造成 ${attackerChar.atk} 點傷害！`);
                    
                    if (mainHp.enemy <= 0) {
                        setTimeout(() => { alert("🏆 敵方主戰者倒下，你贏得了勝利！"); escapeBattle(); }, 300);
                    }
                }
            }, 200); // 動畫撞擊瞬間

            // 動畫結束後移除 class，卡牌就會退回原位
            setTimeout(() => {
                attackerDOM.classList.remove('attacking-self');
            }, 500);
        }

        // ================= 敵方自動隨機攻擊 (測試用) =================
        function enemyRandomAttack() {
            const aliveEnemies = enemyCharacters.filter(c => !c.dead);
            const aliveSelf = selfCharacters.filter(c => !c.dead);

            if (aliveEnemies.length === 0) return alert("敵方星宿已全滅！");
            
            // 隨機派一隻敵方出陣
            const attacker = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
            const attackerDOM = document.getElementById(attacker.id);
            
            attackerDOM.classList.add('attacking-enemy');

            setTimeout(() => {
                if (aliveSelf.length > 0) {
                    // 打我方星宿
                    const target = aliveSelf[Math.floor(Math.random() * aliveSelf.length)];
                    target.hp -= attacker.atk;
                    attacker.hp -= target.atk;
                    
                    triggerShake(target.id);
                    triggerShake(attacker.id);
                    addLog(`🔴 敵方【${attacker.name}】突襲，與你的【${target.name}】發生交戰！`);
                    
                    checkDeath(target);
                    checkDeath(attacker);
                    updateCardUI(target);
                    updateCardUI(attacker);
                } else {
                    // 打我方主戰者
                    mainHp.self -= attacker.atk;
                    triggerShake('hud-self');
                    document.getElementById('self-hp-bar').style.width = (mainHp.self / 30 * 100) + '%';
                    document.getElementById('self-hp-text').innerText = `HP: ${mainHp.self} / 30`;
                    addLog(`💥 你的防線被突破！敵方【${attacker.name}】直接攻擊了你！`);
                    if (mainHp.self <= 0) {
                        setTimeout(() => { alert("💀 主戰者血量歸零，你輸了..."); escapeBattle(); }, 300);
                    }
                }
            }, 200);

            setTimeout(() => attackerDOM.classList.remove('attacking-enemy'), 500);
        }

        // === 直接技能轟炸主戰者 ===
        function testDirectDamage(targetTeam) {
            const damage = 5;
            if (targetTeam === 'self') {
                mainHp.self = Math.max(0, mainHp.self - damage);
                document.getElementById('self-hp-bar').style.width = (mainHp.self / 30 * 100) + '%';
                document.getElementById('self-hp-text').innerText = `HP: ${mainHp.self} / 30`;
                addLog(`💥 敵方發動隕石術，直接對你造成了 ${damage} 點傷害！`);
                if (mainHp.self === 0) { alert("💀 主戰者血量歸零，你輸了..."); escapeBattle(); }
            }
        }

        // === 更新 UI 與死亡檢測 ===
        function updateCardUI(char) {
            if (char.dead) return;
            document.getElementById(`${char.id}-hp`).innerText = char.hp;
            document.getElementById(`${char.id}-atk`).innerText = char.atk;
        }

        function checkDeath(char) {
            if (char.hp <= 0 && !char.dead) {
                char.hp = 0;
                char.dead = true;
                const cardDOM = document.getElementById(char.id);
                cardDOM.classList.add('dead');
                document.getElementById(`${char.id}-hp`).innerText = 0;
                addLog(`💀 【${char.name}】承受不住傷害，化為星塵消散了。`);
            }
        }

        function triggerShake(elementId) {
            const el = document.getElementById(elementId);
            if(el) {
                el.classList.add('taking-damage');
                setTimeout(() => el.classList.remove('taking-damage'), 400);
            }
        }

        function addLog(text) {
            const logBox = document.getElementById('combatLog');
            const newLog = document.createElement('div');
            newLog.className = 'log-entry';
            newLog.innerText = text;
            logBox.appendChild(newLog);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function escapeBattle() {
            document.body.style.opacity = 0;
            setTimeout(() => { window.location.href = 'game.html'; }, 500);
        }
    </script>
</body>
</html>
